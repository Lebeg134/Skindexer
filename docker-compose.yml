services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skindexer
      POSTGRES_USER: skindexer
      POSTGRES_PASSWORD: skindexer_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/Skindexer.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=db;Database=skindexer;Username=skindexer;Password=skindexer_dev
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
