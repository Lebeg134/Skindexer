services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skindexer
      POSTGRES_USER: skindexer
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skindexer -d skindexer"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: ghcr.io/lebeg134/skindexer:latest
    restart: unless-stopped
    environment:
      ConnectionStrings__Default: Host=db;Database=skindexer;Username=skindexer;Password=changeme
      # Uncomment and list the fetchers you want active:
      # Fetchers__Enabled: "cs2-bymykel,cs2-steamanalyst,cs2-cs2sh"
      # Optional: override default cron schedules per fetcher:
      # Fetchers__Schedules__cs2-bymykel: "0 0 * * *"
      # Fetchers__Schedules__cs2-steamanalyst: "0 * * * *"
      # API keys (only needed for fetchers you enabled above):
      # CS2Sh__ApiKey: YOUR_KEY_HERE
      # Pricempire__ApiKey: YOUR_KEY_HERE
      # SteamWebApi__ApiKey: YOUR_KEY_HERE
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
