name: Publish Skindexer.Contracts

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Pack
        run: |
          dotnet pack src/Skindexer.Contracts/Skindexer.Contracts.csproj \
            -c Release \
            /p:Version=${{ github.event.inputs.version }} \
            -o ./nupkg

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --source "https://nuget.pkg.github.com/Lebeg134/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }}
